<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-File Upload Modal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            text-align: center;
            max-width: 800px;
            width: 100%;
            background: white;
            border-radius: 15px;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2);
            padding: 40px;
        }

        h1 {
            color: #2c3e50;
            margin-bottom: 10px;
            font-size: 2.5rem;
        }

        .subtitle {
            color: #7f8c8d;
            margin-bottom: 30px;
            font-size: 1.1rem;
        }

        .btn {
            background: #3498db;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.1rem;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(52, 152, 219, 0.3);
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .btn:hover {
            background: #2980b9;
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(52, 152, 219, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            border-radius: 15px;
            width: 90%;
            max-width: 600px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            animation: modalOpen 0.4s ease-out;
        }

        @keyframes modalOpen {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .modal-header {
            background: #3498db;
            color: white;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-title {
            font-size: 1.5rem;
            font-weight: 600;
        }

        .close-modal {
            background: none;
            border: none;
            color: white;
            font-size: 1.8rem;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .close-modal:hover {
            transform: rotate(90deg);
        }

        .modal-body {
            padding: 25px;
        }

        .upload-area {
            border: 3px dashed #3498db;
            border-radius: 10px;
            padding: 30px;
            text-align: center;
            margin-bottom: 25px;
            transition: all 0.3s;
            cursor: pointer;
            background: #f8f9fa;
        }

        .upload-area:hover, .upload-area.dragover {
            background: #e3f2fd;
            border-color: #2980b9;
        }

        .upload-icon {
            font-size: 3.5rem;
            color: #3498db;
            margin-bottom: 15px;
        }

        .upload-text {
            color: #7f8c8d;
            margin-bottom: 15px;
            font-size: 1.1rem;
        }

        .browse-btn {
            background: #3498db;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 500;
            transition: background 0.3s;
        }

        .browse-btn:hover {
            background: #2980b9;
        }

        #file-input {
            display: none;
        }

        .preview-container {
            margin-top: 20px;
            max-height: 300px;
            overflow-y: auto;
            padding: 10px;
        }

        .preview-item {
            display: flex;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid #eee;
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .preview-icon {
            font-size: 1.8rem;
            margin-right: 15px;
            color: #3498db;
        }

        .preview-info {
            flex-grow: 1;
            text-align: left;
        }

        .preview-name {
            font-weight: 500;
            margin-bottom: 3px;
            word-break: break-all;
        }

        .preview-size {
            color: #7f8c8d;
            font-size: 0.9rem;
        }

        .remove-file {
            background: none;
            border: none;
            color: #e74c3c;
            font-size: 1.2rem;
            cursor: pointer;
            transition: transform 0.2s;
            padding: 5px;
        }

        .remove-file:hover {
            transform: scale(1.2);
        }

        .file-counter {
            text-align: center;
            color: #7f8c8d;
            margin: 15px 0;
            font-weight: 500;
        }

        .modal-footer {
            padding: 20px;
            display: flex;
            justify-content: flex-end;
            gap: 15px;
            background: #f8f9fa;
        }

        .cancel-btn {
            background: #95a5a6;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 500;
            transition: background 0.3s;
        }

        .cancel-btn:hover {
            background: #7f8c8d;
        }

        .upload-btn {
            background: #2ecc71;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 500;
            transition: background 0.3s;
        }

        .upload-btn:hover {
            background: #27ae60;
        }

        .upload-btn:disabled {
            background: #bdc3c7;
            cursor: not-allowed;
        }

        .success-message {
            display: none;
            background: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 5px;
            margin-top: 20px;
            text-align: center;
            font-weight: 500;
        }

        .progress-bar {
            height: 8px;
            background: #ecf0f1;
            border-radius: 4px;
            margin: 20px 0;
            overflow: hidden;
            display: none;
        }

        .progress-fill {
            height: 100%;
            background: #3498db;
            width: 0%;
            transition: width 0.4s ease;
        }

        /* Responsive styles */
        @media (max-width: 768px) {
            .container {
                padding: 25px 15px;
            }

            h1 {
                font-size: 2rem;
            }

            .modal-content {
                width: 95%;
                max-width: none;
                margin: 10px;
            }

            .modal-body {
                padding: 15px;
            }

            .upload-area {
                padding: 20px 15px;
            }

            .upload-icon {
                font-size: 2.5rem;
            }

            .upload-text {
                font-size: 1rem;
            }

            .modal-footer {
                flex-direction: column;
                gap: 10px;
            }

            .modal-footer button {
                width: 100%;
            }

            .preview-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }

            .preview-icon {
                align-self: center;
            }

            .preview-info {
                width: 100%;
            }
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 1.7rem;
            }

            .subtitle {
                font-size: 1rem;
            }

            .btn {
                padding: 12px 20px;
                font-size: 1rem;
            }

            .modal-header {
                padding: 15px;
            }

            .modal-title {
                font-size: 1.3rem;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Multi-File Upload System</h1>
    <p class="subtitle">Upload multiple files with our responsive interface</p>
    <button class="btn" id="openModal">
        <i class="fas fa-cloud-upload-alt"></i> Upload Files
    </button>
</div>

<div class="modal" id="uploadModal">
    <div class="modal-content">
        <div class="modal-header">
            <h2 class="modal-title">Upload Files</h2>
            <button class="close-modal">&times;</button>
        </div>

        <div class="modal-body">
            <div class="upload-area" id="dropArea">
                <div class="upload-icon">
                    <i class="fas fa-cloud-upload-alt"></i>
                </div>
                <p class="upload-text">Drag & drop files here or click to browse</p>
                <button class="browse-btn">Browse Files</button>
                <input type="file" id="file-input" multiple accept="image/*,.pdf,.doc,.docx,.txt">
            </div>

            <div class="file-counter">No files selected</div>

            <div class="progress-bar" id="progressBar">
                <div class="progress-fill" id="progressFill"></div>
            </div>

            <div class="preview-container" id="previewContainer">
                <!-- Preview items will be added here dynamically -->
            </div>

            <div class="success-message" id="successMessage">
                <i class="fas fa-check-circle"></i> Files uploaded successfully!
            </div>
        </div>

        <div class="modal-footer">
            <button class="cancel-btn">Cancel</button>
            <button class="upload-btn" id="uploadButton" disabled>Upload Files</button>
        </div>
    </div>
</div>

<script>
    // DOM Elements
    const modal = document.getElementById('uploadModal');
    const openModalBtn = document.getElementById('openModal');
    const closeModalBtn = document.querySelector('.close-modal');
    const cancelBtn = document.querySelector('.cancel-btn');
    const fileInput = document.getElementById('file-input');
    const browseBtn = document.querySelector('.browse-btn');
    const dropArea = document.getElementById('dropArea');
    const previewContainer = document.getElementById('previewContainer');
    const fileCounter = document.querySelector('.file-counter');
    const uploadButton = document.getElementById('uploadButton');
    const successMessage = document.getElementById('successMessage');
    const progressBar = document.getElementById('progressBar');
    const progressFill = document.getElementById('progressFill');

    // Store selected files
    let selectedFiles = [];

    // Open modal
    openModalBtn.addEventListener('click', () => {
        modal.style.display = 'flex';
    });

    // Close modal
    function closeModal() {
        modal.style.display = 'none';
        resetForm();
    }

    closeModalBtn.addEventListener('click', closeModal);
    cancelBtn.addEventListener('click', closeModal);

    // Close modal when clicking outside
    window.addEventListener('click', (e) => {
        if (e.target === modal) {
            closeModal();
        }
    });

    // Browse files
    browseBtn.addEventListener('click', () => {
        fileInput.click();
    });

    // File selection
    fileInput.addEventListener('change', handleFileSelect);

    // Drag and drop events
    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
        dropArea.addEventListener(eventName, preventDefaults, false);
    });

    function preventDefaults(e) {
        e.preventDefault();
        e.stopPropagation();
    }

    ['dragenter', 'dragover'].forEach(eventName => {
        dropArea.addEventListener(eventName, highlight, false);
    });

    ['dragleave', 'drop'].forEach(eventName => {
        dropArea.addEventListener(eventName, unhighlight, false);
    });

    function highlight() {
        dropArea.classList.add('dragover');
    }

    function unhighlight() {
        dropArea.classList.remove('dragover');
    }

    // Handle dropped files
    dropArea.addEventListener('drop', handleDrop, false);

    function handleDrop(e) {
        const dt = e.dataTransfer;
        const files = dt.files;
        handleFiles(files);
    }

    // Handle file selection
    function handleFileSelect(e) {
        const files = e.target.files;
        handleFiles(files);
    }

    function handleFiles(files) {
        [...files].forEach(file => {
            // Check if file is already selected
            const alreadySelected = selectedFiles.some(f => f.name === file.name && f.size === file.size);
            if (!alreadySelected) {
                selectedFiles.push(file);
            }
        });
        updatePreview();
    }

    // Update file preview
    function updatePreview() {
        previewContainer.innerHTML = '';

        if (selectedFiles.length === 0) {
            fileCounter.textContent = 'No files selected';
            uploadButton.disabled = true;
            return;
        }

        fileCounter.textContent = `${selectedFiles.length} file${selectedFiles.length > 1 ? 's' : ''} selected`;
        uploadButton.disabled = false;

        selectedFiles.forEach((file, index) => {
            const previewItem = document.createElement('div');
            previewItem.className = 'preview-item';

            // Determine icon based on file type
            let iconClass = 'far fa-file';
            if (file.type.startsWith('image/')) {
                iconClass = 'far fa-image';
            } else if (file.type.includes('pdf')) {
                iconClass = 'far fa-file-pdf';
            } else if (file.type.includes('word')) {
                iconClass = 'far fa-file-word';
            }

            previewItem.innerHTML = `
                    <div class="preview-icon">
                        <i class="${iconClass}"></i>
                    </div>
                    <div class="preview-info">
                        <div class="preview-name">${file.name}</div>
                        <div class="preview-size">${formatFileSize(file.size)}</div>
                    </div>
                    <button class="remove-file" data-index="${index}">
                        <i class="fas fa-times"></i>
                    </button>
                `;

            previewContainer.appendChild(previewItem);
        });

        // Add event listeners to remove buttons
        document.querySelectorAll('.remove-file').forEach(btn => {
            btn.addEventListener('click', function() {
                const index = parseInt(this.getAttribute('data-index'));
                removeFile(index);
            });
        });
    }

    // Remove file
    function removeFile(index) {
        selectedFiles.splice(index, 1);
        updatePreview();
    }

    // Format file size
    function formatFileSize(bytes) {
        if (bytes === 0) return '0 Bytes';
        const k = 1024;
        const sizes = ['Bytes', 'KB', 'MB', 'GB'];
        const i = Math.floor(Math.log(bytes) / Math.log(k));
        return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
    }

    // Upload files
    uploadButton.addEventListener('click', uploadFiles);

    function uploadFiles() {
        if (selectedFiles.length === 0) return;

        // Show progress bar
        progressBar.style.display = 'block';
        progressFill.style.width = '0%';

        // Simulate upload progress
        let progress = 0;
        const interval = setInterval(() => {
            progress += 5;
            progressFill.style.width = `${progress}%`;

            if (progress >= 100) {
                clearInterval(interval);
                showSuccess();
            }
        }, 100);
    }

    // Show success message
    function showSuccess() {
        successMessage.style.display = 'block';

        setTimeout(() => {
            successMessage.style.display = 'none';
            closeModal();
        }, 2000);
    }

    // Reset form
    function resetForm() {
        selectedFiles = [];
        fileInput.value = '';
        updatePreview();
        progressBar.style.display = 'none';
        successMessage.style.display = 'none';
    }
</script>
</body>
</html>
