<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Explore Projects - Voltara</title>
  <link rel="icon" href="assets/favicon.ico">

  <!-- External Stylesheets -->
  <!-- Bootstrap 5: Provides responsive grid system, utility classes, and pre-built components -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />

  <!-- Font Awesome: Icon library for UI elements (social media, navigation, category icons) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
    integrity="sha512-Kc323vGBEqzTmouAECnVceyQqyqdsSiqLQISBL29aUW4U/M7pSPA/gEUZQqv1cwx4OnYxTxve5UMg5GT6L4JJg=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />

  <!-- Custom Stylesheet: Contains project-specific styles and overrides -->
  <link href="src/components/styles.css" rel="stylesheet" type="text/css" />
</head>

<body class="d-flex flex-column min-vh-100 explore-layout">

  <!-- =========================== -->
  <!-- LOGIN/SIGNUP MODAL -->
  <!-- =========================== -->
  <div class="modal fade" id="loginSignupModal" tabindex="-1" aria-labelledby="loginSignupModalLabel"
    aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="loginSignupModalLabel">Authentication</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <!-- Pills Navigation for switching forms -->
          <ul class="nav nav-pills nav-fill mb-3" id="pills-tab" role="tablist">
            <li class="nav-item" role="presentation">
              <button class="nav-link active" id="pills-login-tab" data-bs-toggle="pill" data-bs-target="#pills-login"
                type="button" role="tab" aria-controls="pills-login" aria-selected="true">Login</button>
            </li>
            <li class="nav-item" role="presentation">
              <button class="nav-link" id="pills-signup-tab" data-bs-toggle="pill" data-bs-target="#pills-signup"
                type="button" role="tab" aria-controls="pills-signup" aria-selected="false">Sign Up</button>
            </li>
          </ul>
          <!-- Tab Content (Forms) -->
          <div class="tab-content" id="pills-tabContent">
            <!-- Login Form Tab -->
            <div class="tab-pane fade show active" id="pills-login" role="tabpanel" aria-labelledby="pills-login-tab">
              <form>
                <div class="mb-3">
                  <label for="loginEmail" class="form-label">Email address</label>
                  <input type="email" class="form-control" id="loginEmail" aria-describedby="emailHelp"
                    placeholder="Enter email">
                </div>
                <div class="mb-3">
                  <label for="loginPassword" class="form-label">Password</label>
                  <input type="password" class="form-control" id="loginPassword" placeholder="Password">
                </div>
                <button type="submit" class="btn btn-primary w-100">Login</button>
              </form>
            </div>

            <!-- Sign Up Form Tab -->
            <div class="tab-pane fade" id="pills-signup" role="tabpanel" aria-labelledby="pills-signup-tab">
              <form>
                <div class="mb-3">
                  <label for="signupName" class="form-label">Full Name</label>
                  <input type="text" class="form-control" id="signupName" placeholder="Full Name">
                </div>
                <div class="mb-3">
                  <label for="signupEmail" class="form-label">Email address</label>
                  <input type="email" class="form-control" id="signupEmail" placeholder="Enter email">
                </div>
                <div class="mb-3">
                  <label for="signupPassword" class="form-label">Password</label>
                  <input type="password" class="form-control" id="signupPassword" placeholder="Password">
                  <div id="passwordHelpBlock" class="form-text">
                    Your password must be 8-20 characters long.
                  </div>
                </div>
                <button type="submit" class="btn btn-success w-100">Sign Up</button>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- =========================== -->
  <!-- NAVIGATION BAR -->
  <!-- =========================== -->
  <!-- Responsive navigation with mobile hamburger menu, centered nav links, and right-aligned search/auth buttons, using themed color -->
  <nav class="navbar navbar-expand-lg" style="background-color: #23374D;">
    <div class="container-fluid px-4">
      <!-- Logo/Brand - Links to homepage -->
      <a class="navbar-brand" href="index.html">
        <img src="assets/voltara-logo-transparent.png" alt="Voltara Logo" class="navbar-logo" />
      </a>

      <!-- Mobile hamburger toggle button - Visible on small screens -->
      <button class="navbar-toggler navbar-dark" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent"
        aria-controls="navbarContent" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>

      <!-- Collapsible navigation content -->
      <div class="collapse navbar-collapse" id="navbarContent">

        <!-- Center-aligned navigation links -->
        <ul class="navbar-nav mx-auto">
          <li class="nav-item">
            <a class="nav-link text-white fw-semibold" href="index.html">HOME</a>
          </li>
          <li class="nav-item">
            <a class="nav-link text-white fw-semibold active" href="tutorials-explore.html">EXPLORE</a>
          </li>
          <li class="nav-item">
            <a class="nav-link text-white fw-semibold" href="#">ARTICLES</a>
          </li>
          <li class="nav-item">
            <a class="nav-link text-white fw-semibold" href="#">FORUM</a>
          </li>
        </ul>

        <!-- Right-aligned search bar and authentication buttons -->
        <div class="d-flex align-items-center gap-2">
          <!-- Search form -->
          <form class="d-flex" role="search">
            <input id="search-input" class="form-control search-input me-2" type="search" placeholder="Search"
              aria-label="Search" />
            <button class="btn btn-outline-light" type="submit">Search</button>
          </form>

          <!-- Authentication dropdown -->
          <div class="dropdown">
            <button id="authButton" type="button" class="btn btn-secondary dropdown-toggle text-nowrap"
              data-bs-toggle="modal" data-bs-target="#loginSignupModal" aria-expanded="false">
              Login / Signup
            </button>
            <ul class="dropdown-menu dropdown-menu-end" id="authDropdownMenu">
              <li><a class="dropdown-item" href="#" id="nav-dashboard-link">Dashboard</a></li>
              <li><a class="dropdown-item" href="#" id="nav-profile-link">Update Profile</a></li>
              <li><hr class="dropdown-divider"></li>
              <li><a class="dropdown-item" href="#" id="nav-logout-link">Logout</a></li>
            </ul>
          </div>
        </div>

      </div>
    </div>
  </nav>

  <!-- =========================== -->
  <!-- FILTER/CATEGORY BUTTONS SECTION -->
  <!-- =========================== -->
  <!-- Interactive filter buttons for project categories - JavaScript handles filtering logic -->
  <!-- Each button has a data-category attribute used by projectsPage.js for filtering -->
  <section class="filter-section">
    <div class="container-fluid px-4">
      <div class="d-flex justify-content-start align-items-center flex-wrap gap-2">
        <!-- ALL button - Default active state, shows all projects -->
        <button class="btn btn-filter active" data-category="ALL">ALL PROJECTS</button>
        <!-- Category-specific filter buttons -->
        <button class="btn btn-filter" data-category="Arduino">ARDUINO</button>
        <button class="btn btn-filter" data-category="Raspberry Pi">RASPBERRY PI</button>
        <button class="btn btn-filter" data-category="ESP32">ESP32</button>
        <button class="btn btn-filter" data-category="IoT">IOT</button>
        <button class="btn btn-filter" data-category="Robotics">ROBOTICS</button>
        <button class="btn btn-filter" data-category="PCB Design">PCB</button>
        <button class="btn btn-filter" data-category="Sensors">SENSORS</button>
        <button class="btn btn-filter" data-category="STM32">STM32</button>
        <!-- CLEAR button - Resets filter to show all projects -->
        <button class="btn btn-filter" data-category="ALL">CLEAR</button>
      </div>
    </div>
  </section>

  <!-- =========================== -->
  <!-- EXPLORE TUTORIALS SECTION -->
  <!-- =========================== -->
  <!-- Main content area displaying filtered tutorial cards with pagination -->
  <section class="explore-section">
    <div class="container mb-4 ">
      <h1 class="explore-title">Explore Tutorials</h1>

      <!-- ! Search Function: Add this code to tutorials section to display search results -->
      <div id="results"></div>

      <!-- ! Search Function: Add "search-projects-grid" to project grid class -->
      <!-- Tutorials Grid - Dynamically populated by tutorials-explore.js based on selected filter -->
      <!-- Bootstrap responsive grid: 1 column on mobile, 2 on small, 3 on medium+ screens -->
      <div id="explore-projects-grid"
        class="search-projects-grid row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-3 g-4">
        <!-- Tutorial cards will be dynamically inserted here by JavaScript -->
      </div>

      <!-- Pagination controls - Generated by tutorials-explore.js based on filtered results -->
      <nav id="explore-projects-pagination" class="pt-4" aria-label="Tutorials pagination">
        <ul class="pagination justify-content-center">
          <!-- Pagination buttons (Previous, page numbers, Next) inserted here by JavaScript -->
        </ul>
      </nav>
    </div>

    <!-- Updated Footer section -->
     <footer class="bg-dark text-white-50 border-top">
      <div
        class="container-fluid px-4 d-flex flex-column-reverse flex-md-row justify-content-between align-items-center p-3">
        <p class="col-md-4 mb-0">© 2025 Voltara.</p>
        <a href="/"
          class="col-md-4 d-flex align-items-center justify-content-center mb-3 mb-md-0 me-md-auto link-body-emphasis text-decoration-none"
          aria-label="Bootstrap">
          <img src="assets/voltara-logo-transparent.png" alt="Voltara Logo" class="navbar-logo" />
        </a>
        <ul class="nav col-md-4 justify-content-end flex-nowrap">
          <li class="nav-item">
            <a href="index.html" class="nav-link px-2 text-white-50">Home</a>
          </li>
          <li class="nav-item">
            <a href="tutorials-explore.html" class="nav-link px-2 text-white-50">Explore</a>
          </li>
          <li class="nav-item">
            <a href="#" class="nav-link px-2 text-white-50">Articles</a>
          </li>
          <li class="nav-item">
            <a href="#" class="nav-link px-2 text-white-50">Forum</a>
          </li>
        </ul>
      </div>
    </footer>
    <!-- End of Updated Footer section -->

  <!-- TOAST CONTAINER SECTION -->
  <!-- Toast Container -->
  <!-- the toast can be activated by invoking the showToast() function (in index.js)  -->
  <div id="toast-container" class="position-fixed top-0 start-50 translate-middle-x p-3">
    <div id="msg-toast" class="toast align-items-center mt-2 text-white" role="alert" aria-live="assertive"
      aria-atomic="true" data-bs-autohide="true" data-bs-delay="4000">
      <div class="d-flex">
        <div id="msg-toast-body" class="toast-body">
          <!-- Toast message content inserted here by JavaScript -->
        </div>
        <button type="button" class="btn-close me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
      </div>
    </div>
  </div>

  </body>

    <!-- =========================== -->
    <!-- JAVASCRIPT INCLUDES -->
    <!-- =========================== -->

    <!-- Custom JavaScript files - Order matters! -->
    <!-- 0. config-const.js: Shared API base URL and uploads base URL -->
    <script src="./src/components/config-const.js"></script>
    <!-- 1. tutorials-loader.js: fetch tutorials from backend and populate voltaraTutorials object array-->
    <script src="./src/components/tutorials-loader.js"></script>
    <!-- 2. tutorials-pagination.js: Reusable pagination logic and card rendering functions -->
    <script src="./src/components/tutorials-pagination.js"></script>
    <!-- 3. index.js: Shared showToast and homepage utilities -->
    <script src="./src/components/index.js"></script>
    <!-- 4. tutorials-explore.js: Explore page-specific logic (filtering, event handlers) -->
    <script src="./src/components/tutorials-explore.js"></script>
    <!-- 5. user.js: Shared login/signup + navbar auth behavior -->
    <script src="./src/components/script.js"></script>
    <!-- 6. tutorials-search.js: tutorial search feature, on the navbar section -->
    <script src="./src/components/tutorials-search.js"></script>

    <!-- Bootstrap Bundle: Includes Popper.js for tooltips, popovers, and dropdowns -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"></script>

</html>
